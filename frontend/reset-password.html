<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Top Bar -->
  <section class="topbar">
    <div class="logo">
      <span onclick="toggleSidebar()" style="cursor: pointer">☰</span>
      Iowa City Compassion Food Pantry
    </div>
    <div class="user">
      <span id="user-email">Reset Password</span>
    </div>
  </section>

  <main class="container">

    <section class="main">

      <div class="main-grid">

        <div class="main-structure-top">
          <h1>Reset Password</h1>
        </div>

        <div class="main-structure-left">

          <form onsubmit="submitReset(event)">

            <div class="form-group">
              <label>New Password:</label><br />
              <input
                type="password"
                id="newPassword"
                placeholder="Enter new password"
                required
              />
            </div>

            <br />

            <button type="submit" class="btn btn-primary">
              Reset Password
            </button>

            <p id="msg" class="auth-message" style="margin-top:10px;"></p>

          </form>

        </div>

      </div>

    </section>

  </main>

  <script src="js/signup_login.js"></script>
</body>
</html>
